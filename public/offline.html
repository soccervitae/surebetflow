<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — SurebetFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      background: #0a0f1e;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 24px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: rgba(30, 58, 138, 0.2);
      border: 2px solid rgba(30, 58, 138, 0.4);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    p { font-size: 14px; color: #94a3b8; max-width: 280px; line-height: 1.6; }
    button {
      background: #1e3a8a;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1e40af; }
    .status {
      font-size: 12px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>Verifique sua conexão com a internet e tente novamente. Suas apostas salvas permanecem disponíveis.</p>
  <div class="status">
    <span class="dot"></span>
    Sem conexão com a internet
  </div>
  <button onclick="window.location.reload()">Tentar novamente</button>
  <script>
    window.addEventListener('online', () => window.location.reload())
  </script>
</body>
</html>
